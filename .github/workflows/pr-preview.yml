name: PR Preview Environments

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PREVIEW_SSH_HOST: ${{ vars.PREVIEW_SSH_HOST }}
      PREVIEW_SSH_USER: ${{ vars.PREVIEW_SSH_USER }}
      PREVIEW_DOMAIN: ${{ vars.PREVIEW_DOMAIN }}
      PREVIEW_ENV_FILE: ${{ vars.PREVIEW_ENV_FILE }}
      PREVIEW_REMOTE_SCRIPT: /home/preview/preview_deploy.sh
      PREVIEW_SSH_OPTS: -o ServerAliveInterval=30 -o ServerAliveCountMax=10
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build preview image
        uses: docker/build-push-action@v6
        with:
          context: .
          pull: true
          load: true
          tags: preview-pr-${{ env.PR_NUMBER }}:${{ env.PR_HEAD_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PREVIEW_SSH_PRIVATE_KEY }}

      - name: Trust preview host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$PREVIEW_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Copy deploy script
        run: scp $PREVIEW_SSH_OPTS deploy/preview_deploy.sh "$PREVIEW_SSH_USER@$PREVIEW_SSH_HOST:$PREVIEW_REMOTE_SCRIPT"

      - name: Load image on preview server
        run: docker save "preview-pr-${PR_NUMBER}:${PR_HEAD_SHA}" | ssh $PREVIEW_SSH_OPTS "$PREVIEW_SSH_USER@$PREVIEW_SSH_HOST" "docker load"

      - name: Deploy preview container
        id: deploy
        run: |
          set -euo pipefail
          preview_url="https://pr-${PR_NUMBER}.${PREVIEW_DOMAIN}"
          ssh $PREVIEW_SSH_OPTS "$PREVIEW_SSH_USER@$PREVIEW_SSH_HOST" \
            "PREVIEW_ENV_FILE='${PREVIEW_ENV_FILE:-/etc/mielenosoitukset-preview.env}' $PREVIEW_REMOTE_SCRIPT deploy '${PR_NUMBER}' 'preview-pr-${PR_NUMBER}:${PR_HEAD_SHA}'"
          printf 'preview_url=%s\n' "$preview_url" >> "$GITHUB_OUTPUT"

      - name: Publish preview comment
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
          IMAGE_TAG: preview-pr-${{ github.event.pull_request.number }}:${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const marker = '<!-- preview-environment -->';
            const body = [
              marker,
              '### Preview Environment',
              '',
              `Status: active`,
              `URL: ${process.env.PREVIEW_URL}`,
              `Image: \`${process.env.IMAGE_TAG}\``,
              '',
              'This preview runs in a hardened container on the preview server and is isolated from the production host.',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  cleanup:
    if: ${{ github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PREVIEW_SSH_HOST: ${{ vars.PREVIEW_SSH_HOST }}
      PREVIEW_SSH_USER: ${{ vars.PREVIEW_SSH_USER }}
      PREVIEW_DOMAIN: ${{ vars.PREVIEW_DOMAIN }}
      PREVIEW_ENV_FILE: ${{ vars.PREVIEW_ENV_FILE }}
      PREVIEW_REMOTE_SCRIPT: /home/preview/preview_deploy.sh
      PREVIEW_SSH_OPTS: -o ServerAliveInterval=30 -o ServerAliveCountMax=10
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PREVIEW_SSH_PRIVATE_KEY }}

      - name: Trust preview host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$PREVIEW_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Copy deploy script
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: workflow

      - name: Deploy script to preview host
        run: scp $PREVIEW_SSH_OPTS workflow/deploy/preview_deploy.sh "$PREVIEW_SSH_USER@$PREVIEW_SSH_HOST:$PREVIEW_REMOTE_SCRIPT"

      - name: Destroy preview container
        run: |
          ssh $PREVIEW_SSH_OPTS "$PREVIEW_SSH_USER@$PREVIEW_SSH_HOST" \
            "PREVIEW_ENV_FILE='${PREVIEW_ENV_FILE:-/etc/mielenosoitukset-preview.env}' $PREVIEW_REMOTE_SCRIPT destroy '${PR_NUMBER}'"

      - name: Close preview comment
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: https://pr-${{ github.event.pull_request.number }}.${{ vars.PREVIEW_DOMAIN }}
        with:
          script: |
            const marker = '<!-- preview-environment -->';
            const body = [
              marker,
              '### Preview Environment',
              '',
              'Status: stopped',
              `URL: ${process.env.PREVIEW_URL}`,
              '',
              'This preview environment has been torn down because the pull request was closed.',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
