name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Start disposable test services
        run: docker compose -f compose.test.yml up -d mongo redis mailpit

      - name: Debug service startup
        run: docker compose -f compose.test.yml ps

      - name: Wait for test services
        run: |
          python - <<'PY'
          import socket
          import time
          import urllib.request

          checks = [
              ("mongo", "socket", ("127.0.0.1", 27017), 2),
              ("redis", "socket", ("127.0.0.1", 6379), 2),
              ("mailpit", "http", "http://127.0.0.1:8025/api/v1/info", 2),
          ]

          deadline = time.time() + 240
          pending = list(checks)

          while pending and time.time() < deadline:
              remaining = []

              for name, check_type, target, timeout in pending:
                  try:
                      if check_type == "socket":
                          with socket.create_connection(target, timeout=timeout):
                              print(f"✓ {name} is ready")
                      else:
                          with urllib.request.urlopen(target, timeout=timeout) as response:
                              if response.status >= 400:
                                  raise RuntimeError(f"{name} returned {response.status}")
                              print(f"✓ {name} is ready")
                  except Exception as e:
                      print(f"… {name} not ready yet: {e}")
                      remaining.append((name, check_type, target, timeout))

              pending = remaining
              if not pending:
                  break

              time.sleep(2)

          if pending:
              names = ", ".join(name for name, _, _, _ in pending)
              raise SystemExit(f"⚠ Timed out waiting for: {names}")
          PY

      - name: Show service logs if health checks failed
        if: failure()
        run: docker compose -f compose.test.yml logs --no-color --tail=50



      - name: Run test suite
        env:
          TEST_MONGO_URI: mongodb://127.0.0.1:27017
          TEST_REDIS_HOST: 127.0.0.1
          TEST_REDIS_PORT: "6379"
          TEST_MAIL_HOST: 127.0.0.1
          TEST_MAIL_PORT: "1025"
        run: python -m pytest

      - name: Dump test service logs on test failure
        if: failure()
        run: docker compose -f compose.test.yml logs --no-color

      - name: Tear down test services
        if: always()
        run: docker compose -f compose.test.yml down -v
