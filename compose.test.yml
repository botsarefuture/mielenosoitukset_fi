name: mielenosoitukset-fi-test

services:
  mongo:
    image: mongo:8
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  localstack:
    image: localstack/localstack:3.8
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: eu-north-1
      DEBUG: 0
    ports:
      - "127.0.0.1:4566:4566"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  mailpit:
    image: axllent/mailpit:v1.21.5
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
