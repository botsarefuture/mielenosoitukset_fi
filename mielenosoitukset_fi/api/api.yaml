openapi: 3.0.0
info:
  title: Mielenosoitukset.fi API
  version: 1.1.0
  description: Public and session-authenticated API routes exposed under `/api`.
servers:
  - url: https://mielenosoitukset.fi/api
tags:
  - name: Demonstrations
  - name: Friends
  - name: Tokens
paths:
  /demonstrations:
    get:
      tags: [Demonstrations]
      summary: List demonstrations
      responses:
        "200":
          description: Demonstration list
  /demonstrations/{demo_id}:
    get:
      tags: [Demonstrations]
      summary: Get a demonstration
      responses:
        "200":
          description: Demonstration payload
  /demonstrations/{demo_id}/stats:
    get:
      tags: [Demonstrations]
      summary: Get demonstration stats
      responses:
        "200":
          description: Stats payload
  /demonstrations/{demo_id}/like:
    post:
      tags: [Demonstrations]
      summary: Like a demonstration
      responses:
        "200":
          description: Updated likes count
  /demonstrations/{demo_id}/attending:
    get:
      tags: [Demonstrations]
      summary: Get attending state
      responses:
        "200":
          description: Attending state
    post:
      tags: [Demonstrations]
      summary: Update attending state
      responses:
        "200":
          description: Updated attending state
  /demonstrations/{demo_id}/unlike:
    post:
      tags: [Demonstrations]
      summary: Unlike a demonstration
      responses:
        "200":
          description: Updated likes count
  /demonstrations/{demo_id}/likes:
    get:
      tags: [Demonstrations]
      summary: Get likes count
      responses:
        "200":
          description: Like count
  /demonstrations/unapproved:
    get:
      tags: [Demonstrations]
      summary: List unapproved demonstrations
      responses:
        "200":
          description: Unapproved demonstrations
  /admin/demonstrations/{demo_id}:
    get:
      tags: [Demonstrations]
      summary: Get admin demonstration details
      responses:
        "200":
          description: Demonstration payload
  /token/renew:
    post:
      tags: [Tokens]
      summary: Renew a short-lived token
      responses:
        "200":
          description: Renewed token
  /token/long_lived:
    post:
      tags: [Tokens]
      summary: Exchange for a long-lived token
      responses:
        "200":
          description: Long-lived token
  /friends-attending:
    post:
      tags: [Friends]
      summary: Get which friends are attending demonstrations
      responses:
        "200":
          description: Friend attendance mapping
  /user/friends/:
    get:
      tags: [Friends]
      summary: List a user's friends
      responses:
        "200":
          description: Friend list
  /demonstrations/{demo_id}/invite:
    post:
      tags: [Friends]
      summary: Invite friends to a demonstration
      responses:
        "200":
          description: Invitation result
